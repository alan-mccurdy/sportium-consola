<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Califica tu atención</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#FAF6EE;--surface:#FFFCF6;--line:#ECE5D7;--txt:#241F18;--txt-2:#726A5C;--txt-3:#ABA290;--accent:#E2001A;--ok:#1B7A52;--bad:#BF4527}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Manrope',system-ui,sans-serif;color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:
      radial-gradient(700px 500px at 8% -10%, rgba(226,0,26,.13), transparent 60%),
      radial-gradient(620px 520px at 108% 108%, rgba(255,176,32,.13), transparent 60%),
      var(--bg)}
  .card{width:min(430px,100%);background:var(--surface);border:1px solid rgba(255,255,255,.95);border-radius:22px;padding:34px 30px;text-align:center;
    box-shadow:0 4px 10px rgba(60,45,20,.08),0 34px 70px -24px rgba(60,45,20,.45)}
  h1{font-size:19px;letter-spacing:-.3px;margin-bottom:6px}
  p{font-size:13.5px;color:var(--txt-2);line-height:1.5;margin-bottom:22px}
  .stars{display:flex;justify-content:center;gap:8px;margin-bottom:8px}
  .stars button{width:52px;height:52px;border:1px solid var(--line);border-radius:14px;background:var(--bg);cursor:pointer;display:grid;place-items:center;transition:.15s}
  .stars button:hover{border-color:var(--accent)}
  .stars button svg{width:26px;height:26px;fill:none;stroke:#C9BFA9;stroke-width:1.8;transition:.15s}
  .stars button.sel{border-color:var(--accent);background:#FBE7E2}
  .stars button.sel svg{fill:#F5B301;stroke:#D89B00}
  .star-lbl{font-size:12px;color:var(--txt-3);min-height:16px;margin-bottom:16px}
  textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font:inherit;font-size:13.5px;color:var(--txt);background:var(--bg);resize:vertical;min-height:74px;margin-bottom:14px}
  textarea:focus{outline:none;border-color:var(--accent)}
  .btn{width:100%;border:none;border-radius:12px;padding:12px;font:inherit;font-size:14px;font-weight:800;background:var(--accent);color:#fff;cursor:pointer;box-shadow:0 12px 30px -12px rgba(226,0,26,.5)}
  .btn:disabled{opacity:.45;box-shadow:none;cursor:default}
  .msg{margin-top:14px;font-size:13px;color:var(--txt-2);min-height:18px;line-height:1.45}
  .msg.err{color:var(--bad)}
  .gracias svg{width:52px;height:52px;stroke:var(--ok);fill:none;stroke-width:2;margin-bottom:12px}
  .brand{margin-top:20px;font-size:11px;color:var(--txt-3);letter-spacing:.3px}
</style>
</head>
<body>
<div class="card" id="card">
  <h1>¿Cómo fue la atención?</h1>
  <p>Tu opinión nos ayuda a mejorar. Toca las estrellas para calificar el servicio que recibiste.</p>
  <div class="stars" id="stars"></div>
  <div class="star-lbl" id="starLbl"></div>
  <textarea id="coment" placeholder="¿Algo que quieras contarnos? (opcional)" maxlength="500"></textarea>
  <button class="btn" id="enviar" disabled>Enviar calificación</button>
  <div class="msg" id="msg"></div>
  <div class="brand">Soporte al cliente</div>
</div>
<script>
/* Misma base que la consola (solo la llave ANON, que es pública). El SQL supabase-csat.sql
   permite a "anon" únicamente INSERTAR una calificación válida; leerlas requiere login. */
const SUPABASE_URL  = "https://rmcsmxjzvxoybrziplhw.supabase.co";
const SUPABASE_ANON = "sb_publishable_NMPfsPc95u2PST_BAZfW9A_iek0Z7YE";
const sb=(typeof window.supabase!=='undefined')?window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON):null;
const $=id=>document.getElementById(id);
const q=new URLSearchParams(location.search);
const TENANT=(q.get('t')||'sportium').slice(0,40);
const CONV=(q.get('c')||'').slice(0,80);
const LBL=['','Muy mala','Mala','Regular','Buena','Excelente'];
let rating=0;
const STAR='<svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.2 6.6.8-4.9 4.6 1.3 6.5L12 16.9 6.1 20.1l1.3-6.5L2.5 9l6.6-.8z"/></svg>';
function paint(){
  const btns=$('stars').querySelectorAll('button');
  btns.forEach((b,i)=>b.classList.toggle('sel', i<rating));
  $('starLbl').textContent=LBL[rating]||'';
  $('enviar').disabled=!rating;
}
$('stars').innerHTML=[1,2,3,4,5].map(n=>'<button type="button" aria-label="'+n+' de 5" data-n="'+n+'">'+STAR+'</button>').join('');
$('stars').querySelectorAll('button').forEach(b=>b.onclick=()=>{ rating=parseInt(b.dataset.n,10); paint(); });
function gracias(){
  $('card').innerHTML='<div class="gracias"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12.5l2.5 2.5L16 9.5"/></svg>'+
    '<h1>Gracias por tu calificación</h1><p>La tomamos en cuenta para seguir mejorando la atención.</p></div><div class="brand">Soporte al cliente</div>';
}
$('enviar').onclick=async()=>{
  if(!rating) return;
  if(!sb){ $('msg').textContent='No se pudo conectar. Intenta más tarde.'; $('msg').className='msg err'; return; }
  // evita voto doble desde este dispositivo para la misma conversación
  try{ if(CONV && localStorage.getItem('csat-'+CONV)){ gracias(); return; } }catch(e){}
  $('enviar').disabled=true; $('msg').textContent='Enviando…'; $('msg').className='msg';
  try{
    const {error}=await sb.from('csat_respuestas').insert({tenant:TENANT, conv_id:CONV||null, rating:rating, comentario:($('coment').value||'').trim().slice(0,500)||null});
    if(error) throw error;
    try{ if(CONV) localStorage.setItem('csat-'+CONV,'1'); }catch(e){}
    gracias();
  }catch(e){
    $('msg').textContent='No se pudo enviar en este momento. Intenta de nuevo en unos minutos.';
    $('msg').className='msg err'; $('enviar').disabled=false;
  }
};
</script>
</body>
</html>
